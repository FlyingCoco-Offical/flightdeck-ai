<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>FlightDeckAI - Digital Dispatch</title>

    <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Light Mode Palette applied directly as the default root style */
        :root {
            --bg-gradient: radial-gradient(circle at 50% 0%, #f1f5f9 0%, #cbd5e1 100%);
            --bg-color: #cbd5e1;
            --panel-bg: rgba(255, 255, 255, 0.85);
            --border-color: rgba(0, 0, 0, 0.12);
            --neon-blue: #0284c7;
            --neon-green: #16a34a;
            --text-main: #0f172a;
            --text-muted: #475569;
            --card-inner-bg: rgba(255, 255, 255, 0.6);
            
            /* Airport Button Colors */
            --btn-unselected-bg: rgba(71, 85, 105, 0.04);
            --btn-unselected-border: rgba(71, 85, 105, 0.25);
            --btn-unselected-text: #475569;
        }

        body {
            background: var(--bg-gradient);
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            min-height: 100vh;
        }

        .hero-title {
            font-weight: 800;
            letter-spacing: -0.05em;
            background: linear-gradient(135deg, var(--text-main) 0%, var(--neon-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(2, 132, 199, 0.15);
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.08);
        }

        .form-label-title {
            color: var(--neon-blue);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
        }

        .form-control, .form-select {
            background-color: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--border-color);
            color: var(--text-main) !important;
            border-radius: 8px;
            padding: 10px 14px;
        }

        .form-control:focus, .form-select:focus {
            background-color: #ffffff;
            border-color: var(--neon-blue);
            box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.2);
        }

        .form-control::placeholder {
            color: var(--text-muted) !important;
            opacity: 0.7;
        }

        .btn-dispatch {
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
            border: none;
            color: #fff;
            font-weight: 700;
            letter-spacing: 0.05em;
            padding: 12px 24px;
            border-radius: 10px;
            box-shadow: 0 4px 14px rgba(3, 105, 161, 0.25);
            transition: all 0.2s ease;
        }

        .btn-dispatch:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(3, 105, 161, 0.4);
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
        }

        .form-range::-webkit-slider-runnable-track {
            background: var(--border-color);
            height: 8px;
            border-radius: 4px;
        }

        .form-range::-webkit-slider-thumb {
            background: var(--neon-blue);
            margin-top: -4px;
            box-shadow: 0 0 10px rgba(2, 132, 199, 0.3);
        }

        #output .card {
            background: var(--card-inner-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 12px;
        }

        #output .btn-outline-primary {
            border-color: var(--btn-unselected-border);
            color: var(--btn-unselected-text);
            background-color: var(--btn-unselected-bg);
            transition: all 0.2s ease;
        }

        #output .btn-outline-primary:hover,
        #output .btn-outline-primary:focus {
            background-color: rgba(2, 132, 199, 0.1);
            border-color: var(--neon-blue);
            color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(2, 132, 199, 0.1);
        }

        .progress {
            background-color: rgba(0, 0, 0, 0.1);
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-bar {
            background-color: var(--neon-blue);
            box-shadow: 0 0 8px rgba(2, 132, 199, 0.3);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>

<body>

<div class="container py-5" style="max-width: 1000px;">

    <div class="text-center mb-5">
        <h1 class="hero-title display-4 mb-2">FlightDeckAI</h1>
        <p class="text-muted fs-5">Next-Gen Intelligent IFR Route Dispatcher</p>
    </div>

    <div class="glass-panel p-4 p-md-5 mb-5">
        <div class="row g-4">
            
            <div class="col-md-7">
                <div class="mb-4">
                    <label for="request" class="form-label form-label-title">Route Preference & Criteria</label>
                    <textarea
                        id="request"
                        rows="4"
                        class="form-control"
                        placeholder="e.g. Scenic mountain passage, stormy approaches to challenge, or sunny coastlines..."></textarea>
                </div>
            </div>

            <div class="col-md-5 d-flex flex-column justify-content-between">
                <div class="mb-3">
                    <label for="origin" class="form-label form-label-title">Origin Airport (ICAO)</label>
                    <input
                        id="origin"
                        class="form-control"
                        placeholder="e.g. KBOS, EGLL, RJTT"
                        style="text-transform: uppercase;"
                    >
                </div>

                <div class="mb-3">
                    <label for="aircraft" class="form-label form-label-title">Aircraft Profile</label>
                    <select id="aircraft" class="form-select">
                        <option value="C172">Cessna 172 Skyhawk (110 kts)</option>
                        <option value="SR22">Cirrus SR22 (180 kts)</option>
                        <option value="TBM9">Daher TBM 930 (320 kts)</option>
                        <option value="C700">Cessna Citation Longitude (480 kts)</option>
                    </select>
                </div>
            </div>

            <div class="col-12 mt-2">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <label for="flightRange" class="form-label form-label-title mb-0">Target Flight Time</label>
                    <span class="badge fs-6 border" style="background-color: var(--card-inner-bg); color: var(--neon-blue); border-color: var(--border-color) !important;">
                        <span id="flightValue">2.0</span> hrs
                    </span>
                </div>
                <input
                    id="flightRange"
                    type="range"
                    class="form-range"
                    min="0.5"
                    max="8"
                    step="0.5"
                    value="2"
                    oninput="flightValue.innerHTML=parseFloat(this.value).toFixed(1)"
                >
            </div>

        </div>

        <button
            id="generateButton"
            class="btn btn-dispatch w-100 mt-4 text-uppercase"
            py-click="generate_flight">
            ⚡ Generate Flight Plan
        </button>

        <div id="progressArea" style="display:none" class="mt-4 pt-3 border-top border-secondary">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span id="statusText" class="text-info small fw-bold">Connecting to ATC network...</span>
            </div>
            <div class="progress">
                <div
                    id="progressBar"
                    class="progress-bar"
                    style="width:0%">
                </div>
            </div>
